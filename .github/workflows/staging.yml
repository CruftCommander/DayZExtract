name: Staging

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Pre-release label appended to the version (e.g. beta, alpha, rc1).
        required: true
        default: beta
        type: string

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install vpk
        run: dotnet tool install -g vpk --version 0.0.1589-ga2c5a97

      - name: Set release type
        id: version
        shell: pwsh
        run: |
          $releaseType = '${{ inputs.release_type }}'
          $path = (Resolve-Path Publish.props).Path
          [xml]$props = Get-Content $path
          $pg = $props.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
          $pg.SelectSingleNode('ReleaseType').InnerText = $releaseType
          $props.Save($path)
          echo "version=$($pg.Version)-$releaseType" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish -c Release -r win-x64

      - name: Download previous release
        run: vpk download github --repoUrl https://github.com/wrdg/DayZExtract --token ${{ secrets.GITHUB_TOKEN }} -o releases
        continue-on-error: true

      - name: Pack
        run: vpk pack -u DayZExtract -v ${{ steps.version.outputs.version }} -o releases -p publish --mainExe DayZExtract.exe --packAuthors Wardog --msi --instLocation PerUser

      - name: Upload
        run: vpk upload github --repoUrl https://github.com/wrdg/DayZExtract --token ${{ secrets.GITHUB_TOKEN }} -o releases --publish --tag v${{ steps.version.outputs.version }} --pre
